name: Scheduled Tweet

on:
  schedule:
    - cron: "0 0 * * *" # 毎日日本時間 9:00 (UTC 0:00) に実行
  workflow_dispatch: # GitHub上のボタンから手動実行できるようにする

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Call Tweet API
        run: |
          URL="${{ secrets.APP_URL }}"
          # 末尾のスラッシュを削除して正規化
          CLEAN_URL="${URL%/}"
          curl -v -X GET "$CLEAN_URL/api/cron/tweet" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
