name: Scheduled Tweet

on:
  schedule:
    - cron: "0 11,23 * * *" # 毎日日本時間 8:00 (UTC 23:00) と 20:00 (UTC 11:00) に実行
  workflow_dispatch: # GitHub上のボタンから手動実行できるようにする

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Call Tweet API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi

          CLEAN_URL="${APP_URL%/}"
          echo "Target URL: $CLEAN_URL/api/cron/tweet"

          curl -v -f -X GET "$CLEAN_URL/api/cron/tweet" \
          -H "Authorization: Bearer $CRON_SECRET"
